name: Release Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build_linux_x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rs

      - run: cargo install cargo-kotars --git https://github.com/JetpackDuba/kotars
      - run: cargo install cross

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Rust bindings
        run: ./gradlew rustTasks -PuseCross=true -PisLinuxAarch64=false

      - name: Build fat JAR
        run: ./gradlew fatJarLinux -PuseCross=true -PisLinuxAarch64=false

      - name: Generate SHA256 checksum
        working-directory: ./app/build/libs
        run: find . -type f -name "*.jar" -exec bash -c 'sha256sum "$1" > "$1.sum"' _ {} \;

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          body: "Release ${{ github.ref_name }}"
          prerelease: true
          draft: true
          files: |
            app/build/libs/Gitpulpu-linux-x86_64-*.jar
            app/build/libs/Gitpulpu-linux-x86_64-*.jar.sum

  build_linux_aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rs

      - run: cargo install cargo-kotars --git https://github.com/JetpackDuba/kotars
      - run: cargo install cross

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Rust bindings
        run: ./gradlew rustTasks -PuseCross=true -PisLinuxAarch64=true

      - name: Build fat JAR
        run: ./gradlew fatJarLinux -PuseCross=true -PisLinuxAarch64=true

      - name: Generate SHA256 checksum
        working-directory: ./app/build/libs
        run: find . -type f -name "*.jar" -exec bash -c 'sha256sum "$1" > "$1.sum"' _ {} \;

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          body: "Release ${{ github.ref_name }}"
          prerelease: true
          draft: true
          files: |
            app/build/libs/Gitpulpu-linux-arm_aarch64-*.jar
            app/build/libs/Gitpulpu-linux-arm_aarch64-*.jar.sum

  build_windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rs

      - run: cargo install cargo-kotars --git https://github.com/JetpackDuba/kotars

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Rust bindings
        run: ./gradlew rustTasks

      - name: Build distributable
        run: ./gradlew createDistributable

      - name: Compile installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: gitnuro.iss
          options: /O+ /DMyAppVersion="${{ github.ref_name }}"

      - name: Create portable ZIP
        run: Compress-Archive -Path app/build/compose/binaries/main/app/Gitpulpu/* -Destination Output/Gitpulpu_Windows_Portable_${{ github.ref_name }}.zip

      - name: Generate SHA256 checksum
        shell: bash
        working-directory: ./Output/
        run: find -type f \( -name "*.exe" -o -name "*.zip" \) -exec bash -c 'sha256sum "$1" > "$1.sum"' _ {} \;

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          body: "Release ${{ github.ref_name }}"
          prerelease: true
          draft: true
          files: |
            Output/Gitpulpu*.exe
            Output/Gitpulpu*.exe.sum
            Output/Gitpulpu*.zip
            Output/Gitpulpu*.zip.sum

  build_macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
          targets: x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rs

      - run: cargo install cargo-kotars --git https://github.com/JetpackDuba/kotars

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Rust bindings
        run: ./gradlew rustTasks

      - name: Build distributable
        run: ./gradlew createDistributable

      - name: Create macOS ZIP
        run: |
          mkdir -p Output
          cd app/build/compose/binaries/main/app/
          zip -r "$GITHUB_WORKSPACE/Output/Gitpulpu_macos_${{ github.ref_name }}.zip" .

      - name: Generate SHA256 checksum
        working-directory: ./Output/
        run: find . -type f -name "*.zip" -exec bash -c 'shasum -a 256 "$1" > "$1.sum"' _ {} \;

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          body: "Release ${{ github.ref_name }}"
          prerelease: true
          draft: true
          files: |
            Output/Gitpulpu*.zip
            Output/Gitpulpu*.zip.sum
